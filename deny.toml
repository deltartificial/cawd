# cargo-deny — License, vulnerability and source auditing
# Usage: cargo deny --all-features check all

# ============================================================================
# ADVISORIES
# ============================================================================
[advisories]
version = 2
yanked = "warn"
# Both crates are pulled transitively by `syntect` (used only to load the
# bundled, trusted syntax/theme definitions at startup). They are flagged as
# unmaintained with no patched release available; revisit if syntect migrates.
ignore = [
  "RUSTSEC-2025-0141", # bincode 1.x unmaintained (via syntect)
  "RUSTSEC-2024-0320", # yaml-rust unmaintained (via syntect)
]

# ============================================================================
# BANS
# ============================================================================
[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
deny = [{ name = "openssl" }]
# windows-sys ships several majors across the graph (clap, rustix, mio, tokio,
# reqwest's hyper stack…). It is Windows-only and never compiled on the targets
# cawd ships, so the duplication is benign.
skip = [
  { name = "windows-sys" },
]
skip-tree = []

# ============================================================================
# LICENSES
# ============================================================================
[licenses]
version = 2
confidence-threshold = 0.8
private = { ignore = true }
unused-allowed-license = "warn"

allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDDL-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "OpenSSL",
  "Unicode-3.0",
  "Unlicense",
  "WTFPL",
  "Zlib",
  "LicenseRef-rustls-webpki",
]

exceptions = []

[[licenses.clarify]]
name = "unicode-ident"
version = "*"
expression = "(MIT OR Apache-2.0) AND Unicode-DFS-2016"
license-files = [{ path = "LICENSE-UNICODE", hash = 0x3fb01745 }]

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "rustls-webpki"
expression = "LicenseRef-rustls-webpki"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

# ============================================================================
# SOURCES
# ============================================================================
[sources]
unknown-registry = "warn"
unknown-git = "deny"
allow-git = []
